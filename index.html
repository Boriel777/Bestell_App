<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/root.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">

    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/local_storage_manipulations.js" defer></script>
    <script src="./scripts/templates.js" defer></script>
    <script src="./scripts/functions.js" defer></script>
    <script src="./scripts/navigation.js" defer></script>
    <script src="./script.js" defer></script>
    <title>Bestell App</title>
</head>

<body>
    <header>
        <a href=""><img src="assets/icons/Logo 01.svg" alt="Logo"></a>
        <nav id="menu_navigation"></nav>
        <nav id="mobile_nav">
            <ul>
                <li><a href="#"><img src="assets/icons/home.svg" alt="Home"></a></li>
                <li><img src="assets/icons/person.svg" alt="Profil (bald verfügbar)"></li>
                <li><img src="assets/icons/takeout_dining_2.svg" alt="Letzte Bestellung (bald verfügbar)"></li>
                <li><button onclick="openCartModal()" id="cart_trigger"><img src="assets/icons/shopping_cart.svg" alt="Warenkorb öffnen"></button></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Dali's Imbiss</h1>
        <section class="categories_navigation">
            <label for="#categories_nav">Filter:</label>
            <nav id="categories_nav"></nav>
        </section>
        <section class="menu">
            <div id="Menu_wrapper"></div>
            <div id="shopping_cart"></div>
        </section>
    </main>
    <footer>
        &copy;2026 Dalibor Durbas
    </footer>
    <div id="order_modal" class="hidden" onclick="closeModal()">
        <div class="modal_content">
            <button id="modal_close" onclick="closeModal()" aria-label="Bestätigung schließen">&times;</button>
            <img src="" alt="Bestellung erfolgreich">
            <p>Danke für deine Bestellung, deine Lieferung ist unterwegs.</p>
        </div>
    </div>
    <div id="cart_modal" class="hidden"><button id="cart_modal_close_btn" aria-label="Warenkorb schließen">&times;</button></div>
</body>

</html>
